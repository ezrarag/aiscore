name: Score
options:
  bundleIdPrefix: edu.uwm.craftingai
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Score:
    type: application
    platform: [iOS, macOS]
    sources: [Score]
    info:
      path: Score/Resources/Info.plist
      properties:
        CFBundleDisplayName: Score
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSPhotoLibraryUsageDescription: Select visual art to use as a studio background.
        NSCameraUsageDescription: Record video provocations and class content.
        NSMicrophoneUsageDescription: Record audio for video provocations.
        NSAppleEventsUsageDescription: Score uses Keynote automation to create and synchronize presentation slides.
    entitlements:
      path: Score/Resources/Score.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.device.camera: true
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
        com.apple.security.temporary-exception.apple-events:
          - com.apple.Keynote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.uwm.craftingai.score
        PRODUCT_NAME: Score
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
